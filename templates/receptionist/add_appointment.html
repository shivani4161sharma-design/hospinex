{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
.add-appt-page {
    background: #f1f5f9;
    min-height: calc(100vh - 86px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    font-family: 'Inter', sans-serif;
}

.add-appt-card {
    background: #ffffff;
    width: 100%;
    max-width: 580px;
    border-radius: 20px;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02);
    overflow: hidden;
    position: relative;
    border: 1px solid #e2e8f0;
}

.add-appt-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, #1e7e34, #22c55e);
}

.card-header {
    padding: 35px 40px 20px;
    text-align: center;
}

.card-header h2 {
    font-size: 28px;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.card-header p {
    color: #64748b;
    font-size: 15px;
}

.card-body {
    padding: 0 40px 40px;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
}

@media(max-width: 600px) {
    .form-row { grid-template-columns: 1fr; gap: 0; }
}

.input-grp {
    margin-bottom: 20px;
}

.input-grp label {
    display: block;
    font-size: 13.5px;
    font-weight: 700;
    color: #334155;
    margin-bottom: 8px;
}

.input-grp input,
.input-grp select {
    width: 100%;
    padding: 14px 18px;
    background: #f8fafc;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    color: #0f172a;
    transition: all 0.3s ease;
}

.input-grp input:focus,
.input-grp select:focus {
    background: #ffffff;
    border-color: #1e7e34;
    outline: none;
    box-shadow: 0 0 0 4px rgba(30, 126, 52, 0.12);
}

.submit-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #1e7e34, #145a23);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 10px 15px -3px rgba(30, 126, 52, 0.3);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    margin-top: 10px;
}

.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 20px -5px rgba(30, 126, 52, 0.4);
}

.submit-btn:active {
    transform: translateY(0);
}

.back-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 25px;
    text-decoration: none;
    color: #64748b;
    font-weight: 600;
    font-size: 14.5px;
    transition: 0.2s;
}

.back-link:hover {
    color: #0f172a;
}

</style>

<div class="add-appt-page">
    <div class="add-appt-card">
        <div class="card-header">
            <h2><i class="fa-solid fa-calendar-check" style="color: #1e7e34;"></i> Book Patient</h2>
            <p>Register a walk-in patient directly into the queue.</p>
        </div>

        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                <div class="input-grp">
                    <label>Full Name</label>
                    <input type="text" name="patient_name" placeholder="E.g. James Smith" required>
                </div>

                <div class="form-row">
                    <div class="input-grp" style="margin-bottom:0;">
                        <label>Email Address</label>
                        <input type="email" name="patient_email" placeholder="patient@example.com" required>
                    </div>
                    <div class="input-grp" style="margin-bottom:0;">
                        <label>Phone Number</label>
                        <input type="text" name="patient_phone" placeholder="+1 (555) 000-0000" required>
                    </div>
                </div>

                <div class="form-row" style="margin-top:20px;">
                    <div class="input-grp" style="margin-bottom:0;">
                        <label>Assign Doctor</label>
                        <select name="doctor_id" required>
                            <option value="">-- Choose Specialist --</option>
                            {% for doctor in doctors %}
                                <option value="{{ doctor.id }}">Dr. {{ doctor.user.get_full_name|default:doctor.user.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="input-grp" style="margin-bottom:0;">
                        <label>Appointment Date</label>
                        <input type="date" name="appointment_date" required id="datePicker">
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="apptSubmitBtn">
                    Create Appointment <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <a href="{% url 'receptionist_dashboard' %}" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Return to Desk
            </a>
        </div>
    </div>
</div>

<script>
    // Prevent assigning dates in the past
    document.addEventListener("DOMContentLoaded", function() {
        let today = new Date().toISOString().split('T')[0];
        document.getElementById("datePicker").setAttribute('min', today);
    });
</script>

{% endblock %}
