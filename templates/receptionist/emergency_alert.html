{% extends "base.html" %}
{% load static %}
{% block content %}

<div style="max-width:600px; margin:40px auto; background:white; padding:30px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.1);">

    <h2 style="color:#c62828; margin-bottom:10px;">
        🚨 Emergency Alert
    </h2>

    <p style="color:#555; margin-bottom:20px;">
        Send emergency details directly to doctor
    </p>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="patient_name" placeholder="Patient Name" required
               style="width:100%; padding:10px; margin-bottom:15px;">

        <input type="text" name="patient_phone" placeholder="Patient Phone" required
               style="width:100%; padding:10px; margin-bottom:15px;">

        <textarea name="message" placeholder="Emergency details" required
                  style="width:100%; padding:10px; height:100px; margin-bottom:15px;"></textarea>

        <select name="doctor_id" required
                style="width:100%; padding:10px; margin-bottom:20px;">
            <option value="">Select Doctor</option>
            {% for d in doctors %}
                <option value="{{ d.id }}">
                    Dr. {{ d.get_full_name|default:d.username }}
                </option>
            {% endfor %}
        </select>

        <button type="submit" style="
            background:#c62828;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:6px;
            width:100%;
            font-size:16px;
        ">
            Send Emergency Alert
        </button>
    </form>

</div>

{% endblock %}
