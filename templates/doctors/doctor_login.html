{% extends "base.html" %}
{% load static %}
{% block content %}

<div style="
    min-height:70vh;
    display:flex;
    align-items:center;
    justify-content:center;
">

    <div style="
        width:420px;
        background:white;
        padding:40px;
        border-radius:14px;
        box-shadow:0 20px 50px rgba(0,0,0,.15);
        text-align:center;
    ">

        <h2 style="color:#2e7d32; margin-bottom:8px;">Doctor Login</h2>
        <p style="color:#666; margin-bottom:30px;">
            Access your professional dashboard
        </p>

        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username"
                   placeholder="Username"
                   required
                   style="width:100%;padding:12px;margin-bottom:15px;border-radius:8px;border:1px solid #ccc;">

            <input type="password" name="password"
                   placeholder="Password"
                   required
                   style="width:100%;padding:12px;margin-bottom:25px;border-radius:8px;border:1px solid #ccc;">

            <button type="submit"
                    style="width:100%;padding:12px;background:#2e7d32;color:white;border:none;border-radius:8px;font-weight:600;">
                Login
            </button>
        </form>

    </div>
</div>

        </form>
    </div>
</section>
{% endblock %}
