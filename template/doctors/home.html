<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>
    <style>
        body { font-family: Arial; }
        .card {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 15px;
            display: inline-block;
            width: 220px;
            text-align: center;
        }
        img {
            width: 150px;
            height: 150px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<h1>Our Doctors</h1>

{% for doctor in doctors %}
<div class="card">
    <img src="{{ doctor.photo.url }}">
    <h3>{{ doctor.name }}</h3>
    <p>{{ doctor.specialization }}</p>
</div>
{% empty %}
<p>No doctors added yet.</p>
{% endfor %}

</body>
</html>
